name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    env:
      SERVER_DIR: libcco-language-server

    steps:
      - name: Checkout language server
        uses: actions/checkout@v4
        with:
          path: ${{ env.SERVER_DIR }}

      - name: Checkout libcco (main branch)
        uses: actions/checkout@v4
        with:
          repository: aplt-cnt/libcco
          path: libcco

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ env.SERVER_DIR }}/client/package-lock.json

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install make (Windows)
        if: runner.os == 'Windows'
        run: choco install make --confirm --no-progress

      - name: Build libcco
        run: make lib
        working-directory: ${{ env.SERVER_DIR }}
        shell: bash

      - name: Build language server
        run: make server
        working-directory: ${{ env.SERVER_DIR }}
        shell: bash

      - name: Install extension dependencies
        run: npm ci
        working-directory: ${{ env.SERVER_DIR }}/client

      - name: Compile extension
        run: make extension
        working-directory: ${{ env.SERVER_DIR }}
        shell: bash

      - name: Package VSIX
        run: make package
        working-directory: ${{ env.SERVER_DIR }}
        shell: bash

      - name: Run tests
        run: make test
        working-directory: ${{ env.SERVER_DIR }}
        shell: bash

      - name: Upload VSIX artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cco-language-server-${{ runner.os }}
          path: ${{ env.SERVER_DIR }}/client/*.vsix
